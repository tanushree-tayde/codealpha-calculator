<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Professional Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calc-wrapper">
        <div class="screen-box">
            <div id="expression-preview"></div>
            <div id="main-display">0</div>
        </div>
        <div class="pad-layout">
            <button class="action-btn" onclick="wipeScreen()">AC</button>
            <button class="action-btn" onclick="dropLastCharacter()">DEL</button>
            <button class="op-btn" onclick="pushToken('%')">%</button>
            <button class="op-btn" onclick="pushToken('/')">÷</button>

            <button onclick="pushToken('7')">7</button>
            <button onclick="pushToken('8')">8</button>
            <button onclick="pushToken('9')">9</button>
            <button class="op-btn" onclick="pushToken('*')">×</button>

            <button onclick="pushToken('4')">4</button>
            <button onclick="pushToken('5')">5</button>
            <button onclick="pushToken('6')">6</button>
            <button class="op-btn" onclick="pushToken('-')">−</button>

            <button onclick="pushToken('1')">1</button>
            <button onclick="pushToken('2')">2</button>
            <button onclick="pushToken('3')">3</button>
            <button class="op-btn" onclick="pushToken('+')">+</button>

            <button class="long-btn" onclick="pushToken('0')">0</button>
            <button onclick="pushToken('.')">.</button>
            <button class="eval-btn" onclick="runEvaluation()">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
